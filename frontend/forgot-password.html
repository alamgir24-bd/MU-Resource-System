<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="auth-layout">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="panel-card">
            <a href="login.html" class="text-primary fw-semibold">← Back to Login</a>

            <h2 class="fw-bold mt-4 mb-2">Forgot Password</h2>
            <p class="meta mb-4">
              Enter your registered email address. A 6-digit OTP will be sent to your email.
            </p>

            <form id="forgotForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <input id="email" type="email" class="form-control" placeholder="student@example.com" required>
              </div>

              <button class="btn btn-primary w-100 py-2">Send Reset OTP</button>
            </form>

            <div id="messageBox" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    document.getElementById("forgotForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();

      try {
        const data = await apiFetch("/auth/forgot-password", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ email })
        });

        const preview = data.previewOtp
          ? `<div class="small text-break mt-2"><b>Local SMTP not configured. Demo OTP:</b> ${escapeHTML(data.previewOtp)}</div>`
          : "";

        document.getElementById("messageBox").innerHTML = `
          <div class="alert alert-success rounded-4">
            <p class="mb-2">${escapeHTML(data.message || "OTP sent successfully.")}</p>
            ${preview}
            <a class="btn btn-sm btn-primary mt-3" href="reset-password.html?email=${encodeURIComponent(email)}">Reset Password</a>
          </div>
        `;
      } catch (error) {
        showAlert("messageBox", "danger", error.message || "Unable to send OTP.");
      }
    });
  </script>
</body>
</html>
