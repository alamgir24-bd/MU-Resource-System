<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Feedback | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navbarMount"></div>

  <main class="dashboard-page">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-3">
          <div id="sidebarMount"></div>
        </div>

        <div class="col-lg-9">
          <div class="top-card mb-4">
            <span class="ribbon">Admin Report</span>

            <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap mt-3">
              <div>
                <h2 class="fw-bold mb-2">Feedback Analysis Report</h2>
                <p class="meta mb-0">Review all submitted student feedback and ratings.</p>
              </div>

              <button class="btn btn-outline-primary" onclick="loadFeedbacks()">
                Refresh
              </button>
            </div>
          </div>

          <div class="row g-3 mb-4" id="feedbackStats">
            <div class="col-md-4">
              <div class="dashboard-tile">
                <span class="dashboard-tile__badge">Total</span>
                <h3 class="fw-bold mb-0" id="totalFeedback">0</h3>
                <p class="meta mb-0">Submitted feedback</p>
              </div>
            </div>

            <div class="col-md-4">
              <div class="dashboard-tile">
                <span class="dashboard-tile__badge">Average</span>
                <h3 class="fw-bold mb-0" id="averageRating">0.0</h3>
                <p class="meta mb-0">Average rating</p>
              </div>
            </div>

            <div class="col-md-4">
              <div class="dashboard-tile">
                <span class="dashboard-tile__badge">Latest</span>
                <h3 class="fw-bold mb-0" id="latestRating">-</h3>
                <p class="meta mb-0">Latest rating</p>
              </div>
            </div>
          </div>

          <div class="panel-card">
            <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap mb-4">
              <div>
                <h4 class="fw-bold mb-1">All Feedback</h4>
                <p class="meta mb-0">Delete inappropriate or duplicate feedback when needed.</p>
              </div>
            </div>

            <div id="feedbackList" class="row g-4"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>

  <script>
    ensureAdmin();
    renderNavbar("dashboard");
    renderSidebar("feedback");
    renderFooter();

    function safeJs(value = "") {
      return String(value)
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\n/g, " ")
        .replace(/\r/g, " ");
    }

    function renderStars(rating = 0) {
      const score = Math.max(1, Math.min(Number(rating) || 1, 5));
      return "⭐".repeat(score);
    }

    function updateStats(items = []) {
      const total = items.length;
      const average = total
        ? items.reduce((sum, item) => sum + Number(item.rating || 0), 0) / total
        : 0;

      document.getElementById("totalFeedback").textContent = total;
      document.getElementById("averageRating").textContent = average.toFixed(1);
      document.getElementById("latestRating").textContent = total ? Number(items[0].rating || 0) : "-";
    }

    async function loadFeedbacks() {
      const box = document.getElementById("feedbackList");

      box.innerHTML = `
        <div class="col-12">
          <div class="empty-state">Loading feedback...</div>
        </div>
      `;

      try {
        const data = await apiFetch("/feedback", {
          headers: authHeaders(false)
        });

        const items = Array.isArray(data) ? data : [];

        updateStats(items);

        if (!items.length) {
          box.innerHTML = `
            <div class="col-12">
              <div class="empty-state">
                <h5 class="fw-bold mb-2">No feedback found</h5>
                <p class="mb-0">Student feedback will appear here after submission.</p>
              </div>
            </div>
          `;
          return;
        }

        box.innerHTML = items.map(renderFeedbackCard).join("");
      } catch (error) {
        box.innerHTML = `
          <div class="col-12">
            <div class="alert alert-danger rounded-4">
              ${escapeHTML(error.message || "Failed to load feedback.")}
            </div>
          </div>
        `;

        showToast(error.message || "Failed to load feedback.", "error");
      }
    }

    function renderFeedbackCard(item) {
      const user = item.userId || {};
      const userName = user.name || "Unknown Student";
      const userEmail = user.email || "No email available";
      const department = user.department || "-";
      const batch = user.batch || "-";
      const rating = Number(item.rating || 0);
      const safeName = safeJs(userName);

      return `
        <div class="col-md-6">
          <div class="list-card h-100">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
              <div>
                <h5 class="fw-bold mb-1">${escapeHTML(userName)}</h5>
                <div class="meta">${escapeHTML(userEmail)}</div>
              </div>

              <span class="ribbon">${renderStars(rating)}</span>
            </div>

            <div class="d-flex gap-2 flex-wrap mb-3">
              <span class="dashboard-tile__badge">Rating: ${rating}/5</span>
              <span class="dashboard-tile__badge">${escapeHTML(department)}</span>
              <span class="dashboard-tile__badge">Batch: ${escapeHTML(batch)}</span>
            </div>

            <p class="mb-3">${escapeHTML(item.message || "")}</p>

            <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap">
              <small class="small-note">${formatDate(item.createdAt)}</small>

              <button class="btn btn-danger btn-sm" onclick="confirmDeleteFeedback('${item._id}', '${safeName}')">
                Delete
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function confirmDeleteFeedback(id, name) {
      confirmAction(
        `Are you sure you want to delete feedback from "${name}"? This action cannot be undone.`,
        function () {
          deleteFeedback(id);
        },
        {
          title: "Delete Feedback",
          confirmText: "Delete",
          cancelText: "Cancel",
          confirmButtonClass: "btn-danger"
        }
      );
    }

    async function deleteFeedback(id) {
      try {
        const data = await apiFetch(`/feedback/${id}`, {
          method: "DELETE",
          headers: authHeaders(false)
        });

        showToast(data.message || "Feedback deleted successfully.", "success");
        loadFeedbacks();
      } catch (error) {
        showToast(error.message || "Unable to delete feedback.", "error");
      }
    }

    loadFeedbacks();
  </script>
</body>
</html>
