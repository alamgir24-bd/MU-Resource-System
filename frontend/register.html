<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="auth-layout">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="panel-card">
            <a href="index.html" class="text-primary fw-semibold">← Back to Home</a>

            <h2 class="fw-bold mt-4 mb-2">Create Student Account</h2>
            <p class="meta mb-4">Register to upload resources, manage your profile and use student tools.</p>

            <form id="registerForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Full Name</label>
                  <input id="name" class="form-control" placeholder="Your full name" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Email Address</label>
                  <input id="email" type="email" class="form-control" placeholder="student@example.com" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Password</label>
                  <input id="password" type="password" class="form-control" placeholder="Minimum 6 characters" minlength="6" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Confirm Password</label>
                  <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm password" minlength="6" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Department</label>
                  <input id="department" class="form-control" placeholder="CSE" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Batch</label>
                  <input id="batch" class="form-control" placeholder="2026" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Semester</label>
                  <input id="semester" class="form-control" placeholder="4th">
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Student ID</label>
                  <input id="studentId" class="form-control" placeholder="CSE-2026-001">
                </div>
              </div>

              <button id="registerButton" class="btn btn-primary w-100 mt-4 py-2" type="submit">Create Account</button>
            </form>

            <div id="messageBox" class="mt-3"></div>

            <p class="meta text-center mt-4 mb-0">
              Already registered?
              <a href="login.html" class="fw-bold">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const button = document.getElementById("registerButton");
      const messageBox = document.getElementById("messageBox");

      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        department: document.getElementById("department").value.trim(),
        batch: document.getElementById("batch").value.trim(),
        semester: document.getElementById("semester").value.trim(),
        studentId: document.getElementById("studentId").value.trim()
      };

      const confirmPassword = document.getElementById("confirmPassword").value;

      messageBox.innerHTML = "";

      if (payload.password.length < 6) {
        showToast("Password must be at least 6 characters.", "warning");
        return;
      }

      if (payload.password !== confirmPassword) {
        showToast("Password and confirm password do not match.", "warning");
        return;
      }

      button.disabled = true;
      button.textContent = "Creating account...";

      try {
        const data = await apiFetch("/auth/register", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });

        document.getElementById("registerForm").reset();

        showToast(data.message || "Registration successful.", "success");

        messageBox.innerHTML = `
          <div class="alert alert-success rounded-4">
            ${escapeHTML(data.message || "Registration successful.")}
            <br>
            <a href="login.html" class="fw-bold">Login now</a>
          </div>
        `;
      } catch (error) {
        showToast(error.message || "Registration failed.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
