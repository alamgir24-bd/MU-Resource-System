<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Notes | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navbarMount"></div>

  <main class="section-pad">
    <div class="container">
      <div class="top-card mb-4">
        <span class="ribbon">Academic Notes</span>

        <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap mt-3">
          <div>
            <h2 class="fw-bold mb-2">Browse Notes</h2>
            <p class="meta mb-0">Search, preview, download and bookmark approved academic notes.</p>
          </div>

          <a href="upload-notes.html" class="btn btn-primary">
            Upload Notes
          </a>
        </div>
      </div>

      <div class="panel-card mb-4">
        <form id="filterForm" class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label fw-semibold">Search</label>
            <input id="search" class="form-control" placeholder="Title, subject, department">
          </div>

          <div class="col-md-3">
            <label class="form-label fw-semibold">Department</label>
            <input id="department" class="form-control" placeholder="CSE">
          </div>

          <div class="col-md-3">
            <label class="form-label fw-semibold">Semester</label>
            <input id="semester" class="form-control" placeholder="4th">
          </div>

          <div class="col-md-2">
            <label class="form-label fw-semibold">Sort</label>
            <select id="sort" class="form-select">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="title">Title</option>
              <option value="downloads">Downloads</option>
            </select>
          </div>

          <div class="col-12 d-flex gap-2 flex-wrap">
            <button class="btn btn-primary">Apply Filter</button>
            <button type="button" class="btn btn-outline-primary" onclick="resetFilters()">Reset</button>
          </div>
        </form>
      </div>

      <div class="panel-card">
        <div id="notesList" class="resource-grid"></div>
        <div id="paginationMount"></div>
      </div>
    </div>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>

  <script>
    renderNavbar("notes");
    renderFooter();

    let currentPage = 1;

    function safeJs(value = "") {
      return String(value)
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\n/g, " ")
        .replace(/\r/g, " ");
    }

    function getFilters(page = currentPage) {
      const params = new URLSearchParams();

      params.set("page", page);
      params.set("limit", "9");
      params.set("status", "approved");
      params.set("sort", document.getElementById("sort").value || "newest");

      ["search", "department", "semester"].forEach(id => {
        const value = document.getElementById(id).value.trim();
        if (value) params.set(id, value);
      });

      return params.toString();
    }

    async function loadNotes(page = 1) {
      currentPage = page;
      showLoader("notesList", "Loading notes...");

      try {
        const data = await apiFetch(`/notes?${getFilters(page)}`, {
          headers: authHeaders(false)
        });

        const items = data.items || data || [];

        if (!items.length) {
          showEmpty("notesList", "No notes matched your search or filter.");
          document.getElementById("paginationMount").innerHTML = "";
          return;
        }

        document.getElementById("notesList").innerHTML = items.map(renderNoteCard).join("");

        renderPagination({
          mountId: "paginationMount",
          page: data.page || 1,
          totalPages: data.totalPages || 1,
          onPageChange: "loadNotes"
        });
      } catch (error) {
        document.getElementById("notesList").innerHTML = `
          <div class="col-12">
            <div class="alert alert-danger rounded-4">
              ${escapeHTML(error.message || "Unable to load notes.")}
            </div>
          </div>
        `;

        showToast(error.message || "Unable to load notes.", "error");
      }
    }

    function renderNoteCard(item) {
      const fileUrl = getFileUrl(item.filePath);
      const count = getLocalDownloadCount("notes", item._id, item.downloadCount);
      const bookmarked = isBookmarked("notes", item._id);
      const safeTitle = safeJs(item.title || "Note");

      return `
        <div class="resource-card">
          <div class="d-flex justify-content-between gap-2 align-items-start mb-3">
            <span class="status-pill approved">approved</span>
            <small class="meta">${formatDate(item.createdAt)}</small>
          </div>

          <h5 class="fw-bold mb-2">${escapeHTML(item.title || "Untitled Note")}</h5>

          <p class="meta mb-2">
            ${escapeHTML(item.subject || "")} • ${escapeHTML(item.department || "")} • ${escapeHTML(item.semester || "")}
          </p>

          <p class="meta mb-3">Downloads: <span id="download-count-notes-${item._id}">${count}</span></p>

          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-primary btn-sm" onclick="openFilePreview('${fileUrl}', '${safeTitle}')">
              Preview
            </button>

            <a href="${fileUrl}" target="_blank" class="btn btn-primary btn-sm" onclick="handleDownload('notes', '${item._id}')">
              Download
            </a>

            <button
              id="bookmark-btn-notes-${item._id}"
              class="btn ${bookmarked ? "btn-warning" : "btn-outline-primary"} btn-sm"
              onclick='handleBookmark("notes", ${JSON.stringify(item).replace(/'/g, "&#039;")})'
            >
              ${bookmarked ? "Bookmarked" : "Bookmark"}
            </button>
          </div>
        </div>
      `;
    }

    async function handleDownload(type, id) {
      await trackDownload(type, id);

      const countElement = document.getElementById(`download-count-${type}-${id}`);

      if (countElement) {
        const current = Number(countElement.textContent || 0);
        countElement.textContent = current + 1;
      }

      showToast("Download started.", "success");
    }

    function handleBookmark(type, item) {
      if (!isLoggedIn()) {
        showToast("Please login to bookmark resources.", "warning");
        return;
      }

      const added = toggleBookmark(type, item);
      const button = document.getElementById(`bookmark-btn-${type}-${item._id}`);

      if (button) {
        button.textContent = added ? "Bookmarked" : "Bookmark";
        button.className = `btn ${added ? "btn-warning" : "btn-outline-primary"} btn-sm`;
      }

      showToast(
        added ? "Added to bookmarks." : "Removed from bookmarks.",
        added ? "success" : "info"
      );
    }

    function resetFilters() {
      document.getElementById("filterForm").reset();
      document.getElementById("sort").value = "newest";
      showToast("Filters reset.", "info");
      loadNotes(1);
    }

    document.getElementById("filterForm").addEventListener("submit", function (event) {
      event.preventDefault();
      loadNotes(1);
    });

    function lockGuestResourcePage() {
      const topCard = document.querySelector(".top-card");
      if (topCard) topCard.classList.add("d-none");

      const filterCard = document.getElementById("filterForm")?.closest(".panel-card");
      if (filterCard) filterCard.classList.add("d-none");

      const notesList = document.getElementById("notesList");

      if (notesList) {
        notesList.className = "";
      }

      const resourcePanel = notesList?.closest(".panel-card");

      if (resourcePanel) {
        resourcePanel.classList.remove("panel-card");
      }

      showLoginRequired("notesList", "academic notes");
      document.getElementById("paginationMount").innerHTML = "";
    }

    if (!isLoggedIn()) {
      lockGuestResourcePage();
    } else {
      loadNotes();
    }
  </script>
</body>
</html>
