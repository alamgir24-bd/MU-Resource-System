<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Submit Feedback | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navbarMount"></div>

  <main class="dashboard-page">
    <div class="container">
      <div class="row g-4 justify-content-center">
        <div class="col-lg-3">
          <div id="sidebarMount"></div>
        </div>

        <div class="col-lg-7">
          <div class="panel-card">
            <span class="ribbon">Student Feedback</span>

            <h2 class="fw-bold mt-3 mb-2">Submit Feedback</h2>
            <p class="meta mb-4">
              Share your academic experience, suggestions, or any issue about the resource system.
            </p>

            <form id="feedbackForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Feedback Message</label>
                <textarea
                  id="message"
                  class="form-control"
                  rows="5"
                  placeholder="Write your feedback here..."
                  required
                ></textarea>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Rating</label>
                <select id="rating" class="form-select" required>
                  <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                  <option value="4">⭐⭐⭐⭐ Good</option>
                  <option value="3">⭐⭐⭐ Average</option>
                  <option value="2">⭐⭐ Poor</option>
                  <option value="1">⭐ Very Poor</option>
                </select>
              </div>

              <button id="feedbackButton" class="btn btn-primary w-100 py-3" type="submit">
                Submit Feedback
              </button>
            </form>

            <div id="msg" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>

  <script>
    ensureLoggedIn();
    renderNavbar("dashboard");
    renderSidebar("feedback");
    renderFooter();

    document.getElementById("feedbackForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const message = document.getElementById("message").value.trim();
      const rating = document.getElementById("rating").value;
      const button = document.getElementById("feedbackButton");
      const msg = document.getElementById("msg");

      msg.innerHTML = "";

      if (!message) {
        showToast("Please write your feedback message.", "warning");
        return;
      }

      if (message.length < 5) {
        showToast("Feedback message should be at least 5 characters.", "warning");
        return;
      }

      button.disabled = true;
      button.textContent = "Submitting feedback...";

      try {
        const data = await apiFetch("/feedback", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            message,
            rating
          })
        });

        this.reset();
        document.getElementById("rating").value = "5";

        showToast(data.message || "Feedback submitted successfully.", "success");

        msg.innerHTML = `
          <div class="alert alert-success rounded-4">
            ${escapeHTML(data.message || "Feedback submitted successfully.")}
          </div>
        `;
      } catch (error) {
        showToast(error.message || "Unable to submit feedback.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "Submit Feedback";
      }
    });
  </script>
</body>
</html>
