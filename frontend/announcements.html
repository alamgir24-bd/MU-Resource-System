<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Announcements | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navbarMount"></div>

  <main class="section-pad">
    <div class="container">
      <div class="top-card mb-4">
        <span class="ribbon">Academic Notices</span>

        <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap mt-3">
          <div>
            <h2 class="fw-bold mb-2">Announcements</h2>
            <p class="meta mb-0">Latest academic notices from admin.</p>
          </div>

          <button class="btn btn-outline-primary" onclick="loadAnnouncements(true)">
            Refresh
          </button>
        </div>
      </div>

      <div id="announcementList"></div>
    </div>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>

  <script>
    renderNavbar("announcements");
    renderFooter();

    function clearAnnouncementBadge() {
      const badge = document.getElementById("announcementBadge");

      if (badge) {
        badge.textContent = "0";
        badge.classList.add("d-none");
      }
    }

    function markCurrentAnnouncementsAsSeen(count) {
      markAnnouncementsSeen(count);
      clearAnnouncementBadge();
    }

    async function loadAnnouncements(isManualRefresh = false) {
      if (!isLoggedIn()) {
        const topCard = document.querySelector(".top-card");

        if (topCard) {
          topCard.classList.add("d-none");
        }

        showLoginRequired("announcementList", "announcements");
        return;
      }

      showLoader("announcementList", "Loading announcements...");

      try {
        const data = await apiFetch("/announcements");
        const items = Array.isArray(data) ? data : [];

        markCurrentAnnouncementsAsSeen(items.length);

        if (!items.length) {
          showEmpty("announcementList", "No announcements available.");
          return;
        }

        document.getElementById("announcementList").innerHTML = `
          <div class="row g-4">
            ${items.map(renderAnnouncementCard).join("")}
          </div>
        `;

        if (isManualRefresh) {
          showToast("Announcements refreshed.", "info");
        }
      } catch (error) {
        showEmpty("announcementList", "Server error. Please try again later.");
        showToast(error.message || "Unable to load announcements.", "error");
      }
    }

    function renderAnnouncementCard(item) {
      return `
        <div class="col-md-6">
          <div class="panel-card h-100">
            <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-3">
              <span class="ribbon">Notice</span>
              <small class="meta">${formatDate(item.createdAt)}</small>
            </div>

            <h5 class="fw-bold mb-2">${escapeHTML(item.title || "Announcement")}</h5>

            <p class="meta mb-0">
              ${escapeHTML(item.description || item.message || "")}
            </p>
          </div>
        </div>
      `;
    }

    loadAnnouncements();
  </script>
</body>
</html>
