<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navbarMount"></div>

  <main class="dashboard-page">
    <div class="container">
      <div class="row g-4 justify-content-center">
        <div class="col-lg-3">
          <div id="sidebarMount"></div>
        </div>

        <div class="col-lg-6">
          <div class="panel-card">
            <span class="ribbon">Account Security</span>

            <h2 class="fw-bold mt-3 mb-2">Change Password</h2>
            <p class="meta mb-4">Use your current password and choose a stronger new password.</p>

            <form id="changePasswordForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Current Password</label>
                <input id="oldPassword" type="password" class="form-control" placeholder="Current password" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">New Password</label>
                <input id="newPassword" type="password" class="form-control" placeholder="New password" minlength="6" required>
                <small class="meta">Password should be at least 6 characters.</small>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Confirm New Password</label>
                <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm new password" minlength="6" required>
              </div>

              <button id="changePasswordButton" class="btn btn-primary w-100 py-3" type="submit">
                Update Password
              </button>
            </form>

            <div id="messageBox" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>

  <script>
    ensureLoggedIn();
    renderNavbar("dashboard");
    renderSidebar("profile");
    renderFooter();

    document.getElementById("changePasswordForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const oldPassword = document.getElementById("oldPassword").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const button = document.getElementById("changePasswordButton");
      const messageBox = document.getElementById("messageBox");

      messageBox.innerHTML = "";

      if (newPassword.length < 6) {
        showToast("New password must be at least 6 characters.", "warning");
        return;
      }

      if (oldPassword === newPassword) {
        showToast("New password should be different from current password.", "warning");
        return;
      }

      if (newPassword !== confirmPassword) {
        showToast("New password and confirm password do not match.", "warning");
        return;
      }

      button.disabled = true;
      button.textContent = "Updating password...";

      try {
        const data = await apiFetch("/auth/change-password", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            oldPassword,
            newPassword
          })
        });

        this.reset();

        showToast(data.message || "Password changed successfully.", "success");

        messageBox.innerHTML = `
          <div class="alert alert-success rounded-4">
            ${escapeHTML(data.message || "Password changed successfully.")}
          </div>
        `;
      } catch (error) {
        showToast(error.message || "Password update failed.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "Update Password";
      }
    });
  </script>
</body>
</html>
