<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="auth-layout">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="panel-card">
            <a href="login.html" class="text-primary fw-semibold">← Back to Login</a>

            <h2 class="fw-bold mt-4 mb-2">Reset Password</h2>
            <p class="meta mb-4">Enter the 6-digit OTP from your email and create a new password.</p>

            <form id="resetForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <input id="email" type="email" class="form-control" placeholder="student@example.com">
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Reset OTP</label>
                <input id="token" class="form-control" placeholder="6-digit OTP" inputmode="numeric" maxlength="6" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">New Password</label>
                <input id="password" type="password" class="form-control" placeholder="New password" minlength="6" required>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm password" minlength="6" required>
              </div>

              <button class="btn btn-primary w-100 py-2">Reset Password</button>
            </form>

            <div id="messageBox" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("email")) document.getElementById("email").value = params.get("email");
    if (params.get("token")) document.getElementById("token").value = params.get("token");

    document.getElementById("resetForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const token = document.getElementById("token").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password.length < 6) {
        showAlert("messageBox", "warning", "Password must be at least 6 characters.");
        return;
      }

      if (password !== confirmPassword) {
        showAlert("messageBox", "warning", "Password and confirm password do not match.");
        return;
      }

      try {
        const data = await apiFetch(`/auth/reset-password/${encodeURIComponent(token)}`, {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ password })
        });

        document.getElementById("resetForm").reset();
        document.getElementById("messageBox").innerHTML = `
          <div class="alert alert-success rounded-4">
            ${escapeHTML(data.message || "Password reset successful.")}
            <br>
            <a href="login.html" class="fw-semibold">Login now</a>
          </div>
        `;
      } catch (error) {
        showAlert("messageBox", "danger", error.message || "Password reset failed.");
      }
    });
  </script>
</body>
</html>
