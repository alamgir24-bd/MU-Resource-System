<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload PYQ | MU Resource System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navbarMount"></div>

  <main class="dashboard-page">
    <div class="container">
      <div class="row g-4 justify-content-center">
        <div class="col-lg-3">
          <div id="sidebarMount"></div>
        </div>

        <div class="col-lg-7">
          <div class="panel-card">
            <span class="ribbon">Resource Upload</span>
            <h2 class="fw-bold mt-3 mb-2">Upload Previous Year Question</h2>
            <p class="meta mb-4">
              Student PYQ uploads will be sent for admin approval. Admin uploads will be approved automatically.
            </p>

            <form id="uploadPYQForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Title</label>
                <input id="title" name="title" class="form-control" placeholder="Example: Database Final Question 2023" required>
              </div>

              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Subject</label>
                  <input id="subject" name="subject" class="form-control" placeholder="Database" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Department</label>
                  <input id="department" name="department" class="form-control" placeholder="CSE" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Semester</label>
                  <input id="semester" name="semester" class="form-control" placeholder="5th" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold">Year</label>
                  <input id="year" name="year" class="form-control" placeholder="2023" required>
                </div>

                <div class="col-12">
                  <label class="form-label fw-semibold">PDF File</label>
                  <input id="file" name="file" type="file" class="form-control" accept="application/pdf,.pdf" required>
                </div>
              </div>

              <div class="file-drop mt-4" id="fileDrop">
                <strong>Selected file preview</strong>
                <p class="meta mb-0" id="fileInfo">No file selected yet.</p>
              </div>

              <button id="uploadPYQButton" class="btn btn-primary w-100 mt-4 py-3" type="submit">Submit PYQ</button>
            </form>

            <div id="messageBox" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>

  <script>
    ensureLoggedIn();
    renderNavbar("dashboard");
    renderSidebar("pyq");
    renderFooter();

    document.getElementById("file").addEventListener("change", function () {
      const file = this.files[0];
      const info = document.getElementById("fileInfo");
      const messageBox = document.getElementById("messageBox");

      messageBox.innerHTML = "";

      if (!file) {
        info.textContent = "No file selected yet.";
        return;
      }

      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        this.value = "";
        showToast("Only PDF files are allowed.", "warning");
        info.textContent = "No file selected yet.";
        return;
      }

      info.textContent = `${file.name} • ${(file.size / 1024 / 1024).toFixed(2)} MB`;
      showToast("PDF file selected successfully.", "info");
    });

    document.getElementById("uploadPYQForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const button = document.getElementById("uploadPYQButton");
      const messageBox = document.getElementById("messageBox");
      const formData = new FormData(this);

      messageBox.innerHTML = "";
      button.disabled = true;
      button.textContent = "Uploading PYQ...";

      try {
        const data = await apiFetch("/pyq/upload", {
          method: "POST",
          headers: authHeaders(false),
          body: formData
        });

        this.reset();
        document.getElementById("fileInfo").textContent = "No file selected yet.";
        showToast(data.message || "PYQ uploaded successfully.", "success");
      } catch (error) {
        showToast(error.message || "Upload failed.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "Submit PYQ";
      }
    });
  </script>
</body>
</html>
